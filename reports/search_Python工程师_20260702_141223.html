<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>岗位搜索排名 - Python工程师</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f8fafc; color: #1e293b; }
  .container { max-width: 1100px; margin: 0 auto; padding: 32px 20px; }
  h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 4px; }
  .meta { color: #64748b; font-size: 0.875rem; margin-bottom: 24px; }
  .summary-bar { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 28px; }
  .chip { background: #e2e8f0; border-radius: 9999px; padding: 4px 14px; font-size: 0.82rem; color: #475569; }
  .chip strong { color: #1e293b; }
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  thead { background: #f1f5f9; }
  th { padding: 12px 14px; text-align: left; font-size: 0.8rem; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .04em; }
  td { padding: 12px 14px; border-top: 1px solid #f1f5f9; font-size: 0.88rem; vertical-align: middle; }
  tr:hover td { background: #f8fafc; }
  .rank-num { font-weight: 700; color: #94a3b8; font-size: 1rem; width: 40px; text-align: center; }
  .rank-num.top3 { color: #f59e0b; }
  .company-name { font-weight: 600; color: #1e293b; }
  .job-title { color: #3b82f6; }
  .salary { color: #16a34a; font-weight: 600; font-size: 0.85rem; white-space: nowrap; }
  .score-bar-wrap { display: flex; align-items: center; gap: 8px; }
  .score-bar { height: 6px; border-radius: 3px; flex: 1; background: #e2e8f0; max-width: 80px; }
  .score-bar-fill { height: 100%; border-radius: 3px; }
  .score-num { font-weight: 700; font-size: 0.9rem; min-width: 36px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
  .skills { display: flex; flex-wrap: wrap; gap: 4px; }
  .skill-tag { background: #eff6ff; color: #3b82f6; padding: 2px 7px; border-radius: 4px; font-size: 0.75rem; }
  .link-btn { color: #6366f1; text-decoration: none; font-size: 0.8rem; white-space: nowrap; }
  .link-btn:hover { text-decoration: underline; }
  .no-results { text-align: center; padding: 60px 20px; color: #94a3b8; }
  .sub-scores { font-size: 0.75rem; color: #94a3b8; margin-top: 3px; }
</style>
</head>
<body>
<div class="container">
  <h1>岗位搜索结果 · Python工程师</h1>
  <p class="meta">生成时间：2026-07-02 14:12:23</p>

  <div class="summary-bar">
    <div class="chip">城市：<strong>福州</strong></div>
    <div class="chip">结果数：<strong>0</strong></div>
    
  </div>

  
  <div class="no-results">未找到匹配结果，请尝试不同的岗位关键词或城市。</div>
  
</div>
</body>
</html>
